<?xml version="1.0" encoding="UTF-8"?>
<!--
  ClickFlow app icon — minimal, local, simulation-only.
  No external references, no scripts, no foreignObject.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="ClickFlow">
  <title>ClickFlow</title>
  <desc>Minimal ClickFlow application mark. Simulation-only MVP.</desc>

  <defs>
    <linearGradient id="cfBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ea0fb"/>
      <stop offset="100%" stop-color="#4f8ef7"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="url(#cfBg)"/>

  <!-- Click target ring -->
  <circle cx="128" cy="128" r="62" fill="none" stroke="#ffffff" stroke-width="6" stroke-opacity="0.55"/>

  <!-- Inner dot -->
  <circle cx="128" cy="128" r="14" fill="#ffffff"/>

  <!-- Crosshair lines -->
  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-opacity="0.85">
    <line x1="128" y1="44"  x2="128" y2="76"/>
    <line x1="128" y1="180" x2="128" y2="212"/>
    <line x1="44"  y1="128" x2="76"  y2="128"/>
    <line x1="180" y1="128" x2="212" y2="128"/>
  </g>
</svg>
